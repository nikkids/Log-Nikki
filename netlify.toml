# Netlify config for Moment Aware (static PWA, no build step)

[build]
  # Nothing to compile — the site IS the repo root.
  publish = "."
  command = ""

# The service worker must never be cached long-term, or users get stuck
# on an old version and never receive updates.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest served fresh + correct type.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"

# Long-cache the icons (immutable-ish assets).
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
